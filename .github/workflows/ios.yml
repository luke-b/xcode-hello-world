name: iOS CI — Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test (iPad Simulator)
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Environment info ────────────────────────────────────────────
      - name: Show Xcode version
        run: xcodebuild -version

      - name: List available iPad simulators
        run: xcrun simctl list devices available | grep -i ipad || echo "No iPad simulators listed"

      # ── 3. Select simulator ────────────────────────────────────────────
      - name: Select iPad simulator
        id: sim
        run: |
          set -euo pipefail
          # Write JSON to a unique temp file so Python can read it without stdin conflict
          SIMCTL_JSON=$(mktemp /tmp/simctl.XXXXXX.json)
          xcrun simctl list devices available --json > "$SIMCTL_JSON"
          SELECTED_SIM=$(python3 - "$SIMCTL_JSON" <<'EOF'
          import sys, json
          try:
              with open(sys.argv[1]) as f:
                  data = json.load(f)
          except Exception as e:
              print(f"Failed to parse simctl output: {e}", file=sys.stderr)
              sys.exit(1)

          preferred_names = [
              "iPad Pro 13-inch (M5)",
              "iPad Air 11-inch (M3)",
              "iPad (10th generation)",
          ]

          def available_ipads(devices):
              return sorted(
                  [d for d in devices if "iPad" in d.get("name", "") and d.get("isAvailable", False)],
                  key=lambda x: x.get("name", ""),
              )

          # Iterate runtimes newest-first so we pick the latest iOS/iPadOS.
          for runtime_key in sorted(data["devices"].keys(), reverse=True):
              if "iOS" not in runtime_key:
                  continue
              iPads = available_ipads(data["devices"][runtime_key])
              if not iPads:
                  continue

              # Explicit deterministic fallback order by preferred model names.
              for preferred in preferred_names:
                  for dev in iPads:
                      if dev["name"] == preferred:
                          print(f'{dev["name"]}\t{dev["udid"]}\t{runtime_key}')
                          sys.exit(0)

              # Final deterministic fallback for the runtime: alphabetically first iPad.
              dev = iPads[0]
              print(f'{dev["name"]}\t{dev["udid"]}\t{runtime_key}')
              sys.exit(0)

          # No iPad simulator found.
          print("No available iPad simulator found across iOS runtimes.", file=sys.stderr)
          sys.exit(1)
          EOF
          )
          IFS=$'\t' read -r IPAD_SIM IPAD_SIM_UDID IPAD_RUNTIME <<< "$SELECTED_SIM"
          if [ -z "${IPAD_SIM:-}" ] || [ -z "${IPAD_SIM_UDID:-}" ]; then
            echo "::error::Could not select an available iPad simulator (name/UDID missing)"
            exit 1
          fi
          echo "IPAD_SIM=$IPAD_SIM" >> "$GITHUB_ENV"
          echo "IPAD_SIM_UDID=$IPAD_SIM_UDID" >> "$GITHUB_ENV"
          echo "IPAD_RUNTIME=$IPAD_RUNTIME" >> "$GITHUB_ENV"
          echo "Selected simulator name: $IPAD_SIM"
          echo "Selected simulator UDID: $IPAD_SIM_UDID"
          echo "Selected simulator runtime: $IPAD_RUNTIME"

      # ── 4. Build ────────────────────────────────────────────────────────
      - name: Build app
        run: |
          set -o pipefail
          xcodebuild build \
            -project HelloWorld/HelloWorld.xcodeproj \
            -scheme HelloWorld \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ── 5. Unit tests ───────────────────────────────────────────────────
      - name: Run unit tests
        run: |
          xcodebuild test \
            -project HelloWorld/HelloWorld.xcodeproj \
            -scheme HelloWorld \
            -destination "platform=iOS Simulator,id=$IPAD_SIM_UDID" \
            -only-testing HelloWorldTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ── 6. UI tests ─────────────────────────────────────────────────────
      - name: Prepare simulator for UI tests
        run: |
          set -euo pipefail
          echo "Preparing simulator for UI tests: $IPAD_SIM ($IPAD_SIM_UDID)"
          xcrun simctl boot "$IPAD_SIM_UDID" || true
          xcrun simctl bootstatus "$IPAD_SIM_UDID" -b
          xcrun simctl list devices available | grep -F "$IPAD_SIM_UDID" || true

      - name: Run UI tests
        run: |
          xcodebuild test \
            -project HelloWorld/HelloWorld.xcodeproj \
            -scheme HelloWorld \
            -destination "platform=iOS Simulator,id=$IPAD_SIM_UDID" \
            -only-testing HelloWorldUITests \
            -resultBundlePath "$RUNNER_TEMP/ui-tests.xcresult" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload UI test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-tests-xcresult
          path: ${{ runner.temp }}/ui-tests.xcresult
          if-no-files-found: warn
